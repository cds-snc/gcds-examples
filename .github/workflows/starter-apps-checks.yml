name: Starter apps checks

on:
  pull_request:
    paths:
      - 'starter-apps/**'
      - '.github/workflows/starter-apps-checks.yml'
  push:
    branches:
      - main
    paths:
      - 'starter-apps/**'
      - '.github/workflows/starter-apps-checks.yml'

permissions:
  contents: read

jobs:
  react-starter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter-apps/react/react-template
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: starter-apps/react/react-template/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run checks
        run: npm run check

      - name: Run E2E (Chromium)
        run: npm run test:e2e -- --project=chromium

  vue-starter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter-apps/vue/vue-template
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: starter-apps/vue/vue-template/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run checks
        run: npm run check

      - name: Run E2E (Chromium)
        run: npm run test:e2e -- --project=chromium
